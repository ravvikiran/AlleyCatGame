<svg xmlns="http://www.w3.org/2000/svg" width="432" height="432" viewBox="0 0 432 432">
  <!-- Adaptive icon background - dark blue gradient -->
  <defs>
    <radialGradient id="bg_grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a3a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </radialGradient>
  </defs>
  <rect width="432" height="432" fill="url(#bg_grad)"/>
  <!-- Subtle stars -->
  <circle cx="80" cy="80" r="2" fill="#ffffff" opacity="0.3"/>
  <circle cx="350" cy="100" r="1.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="120" cy="350" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="300" cy="300" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="200" cy="50" r="1.5" fill="#ffffff" opacity="0.3"/>
</svg>
