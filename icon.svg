<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Night sky background -->
  <rect width="128" height="128" rx="16" fill="#0a0a1a"/>
  <!-- Moon -->
  <circle cx="100" cy="28" r="14" fill="#ffffcc" opacity="0.8"/>
  <circle cx="106" cy="24" r="12" fill="#0a0a1a"/>
  <!-- Stars -->
  <circle cx="20" cy="20" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="45" cy="12" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="70" cy="22" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="30" cy="40" r="0.8" fill="#ffffff" opacity="0.3"/>
  <!-- Rooftop silhouette -->
  <rect x="0" y="90" width="128" height="38" fill="#1a1a2e"/>
  <rect x="10" y="85" width="25" height="43" fill="#1a1a2e"/>
  <rect x="90" y="80" width="30" height="48" fill="#1a1a2e"/>
  <!-- Cat silhouette on rooftop -->
  <ellipse cx="64" cy="78" rx="16" ry="18" fill="#00cccc"/>
  <!-- Cat head -->
  <circle cx="64" cy="58" r="13" fill="#00cccc"/>
  <!-- Ears -->
  <polygon points="55,48 52,36 60,46" fill="#00cccc"/>
  <polygon points="73,48 76,36 68,46" fill="#00cccc"/>
  <!-- Eyes (glowing in the dark) -->
  <circle cx="59" cy="56" r="3" fill="#ffff00"/>
  <circle cx="69" cy="56" r="3" fill="#ffff00"/>
  <circle cx="60" cy="57" r="1.5" fill="#000000"/>
  <circle cx="70" cy="57" r="1.5" fill="#000000"/>
  <!-- Tail curving up -->
  <path d="M 80 78 Q 92 65 88 50" fill="none" stroke="#00cccc" stroke-width="4" stroke-linecap="round"/>
</svg>
